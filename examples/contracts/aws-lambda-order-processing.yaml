apiVersion: observability.platform/v1alpha1
kind: ObservabilityContract
metadata:
  name: order-processing
  owner: order-processing-team
  system: workshop-order-processing
  environment: dev
  labels:
    app.kubernetes.io/name: order-processing
    platform.io/workload-class: distributed
spec:
  service:
    name: order-processing
    runtime: aws-lambda
    language: nodejs
    framework: aws-serverless
    tier: "2"
    lifecycle: production
  delivery:
    mode: provision
    target: aws
    accountId: "123456789012"
    region: us-east-1
  telemetry:
    openTelemetry:
      enabled: true
      semanticConventions: opentelemetry
      propagators:
        - tracecontext
        - baggage
        - xray
      sampling:
        strategy: parentbased_always_on
    resourceAttributes:
      service.name: order-processing
      service.namespace: workshop
      deployment.environment: dev
      cloud.provider: aws
    signals:
      traces:
        enabled: true
        ingestion: collector
        backendClass: traces-standard
      metrics:
        enabled: true
        ingestion: collector
        backendClass: metrics-standard
        catalog:
          - name: OrdersCreated
            type: counter
            unit: "{order}"
            description: Successful order creations.
            dimensions: [service, operation]
          - name: CreateOrderLatencyMs
            type: histogram
            unit: ms
            description: Latency of POST /orders.
            dimensions: [service, operation]
      logs:
        enabled: true
        ingestion: collector
        backendClass: logs-standard
        format: json
  capabilities:
    dashboards:
      enabled: true
      preset: serverless-api
    alerts:
      enabled: true
      rules:
        - name: api-5xx-rate
          summary: API 5xx responses detected.
          severity: high
          condition: sum(api_5xx) >= 1
          for: 1m
    slos:
      enabled: true
      objectives:
        - name: create-order-availability
          description: Successful create requests over total create requests.
          indicator: availability
          target: 99.9
          window: 30d
    dataManagement:
      retention:
        tracesDays: 7
        metricsDays: 30
        logsDays: 7
      dataClassification: internal
