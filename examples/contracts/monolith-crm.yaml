apiVersion: observability.platform/v1alpha1
kind: ObservabilityContract
metadata:
  name: crm-monolith
  owner: business-systems
  system: crm
  environment: staging
  labels:
    app.kubernetes.io/name: crm-monolith
    platform.io/workload-class: monolith
spec:
  service:
    name: crm-monolith
    runtime: vm
    language: java
    framework: spring-boot
    tier: "2"
    lifecycle: production
  delivery:
    mode: adopt
    target: hybrid
  telemetry:
    openTelemetry:
      enabled: true
      semanticConventions: opentelemetry
      propagators:
        - tracecontext
        - baggage
      sampling:
        strategy: parentbased_traceidratio
        ratio: 0.1
    resourceAttributes:
      service.name: crm-monolith
      service.namespace: crm
      deployment.environment: staging
    signals:
      traces:
        enabled: true
        ingestion: collector
        backendClass: traces-standard
      metrics:
        enabled: true
        ingestion: collector
        backendClass: metrics-standard
        catalog:
          - name: ApplicationOperationCount
            type: counter
            unit: "{operation}"
            description: Total business operations handled by the application.
            dimensions: [operation, result]
          - name: ApplicationOperationDuration
            type: histogram
            unit: ms
            description: End-to-end application operation latency, emitted as a histogram so dashboards can derive p95 and p99.
            dimensions: [operation]
          - name: ApplicationOperationErrors
            type: counter
            unit: "{error}"
            description: Application operations that ended in failure.
            dimensions: [operation]
      logs:
        enabled: true
        ingestion: collector
        backendClass: logs-standard
        format: json
  capabilities:
    dashboards:
      enabled: true
      preset: monolith-business-app
    alerts:
      enabled: true
      rules:
        - name: crm-search-errors
          summary: CRM search errors above threshold.
          severity: medium
          condition: sum(ApplicationOperationErrors) > 5
          for: 10m
    slos:
      enabled: true
      objectives:
        - name: crm-search-availability
          description: Successful customer search requests over total search requests.
          indicator: availability
          target: 99.5
          window: 30d
    dataManagement:
      retention:
        tracesDays: 7
        metricsDays: 60
        logsDays: 14
      dataClassification: internal
