name: Contract Consumer Interface

on:
  workflow_call:
    inputs:
      contract_path:
        description: Path to the ObservabilityContract YAML file in the caller repository.
        required: true
        type: string
      upload_artifacts:
        description: Upload validation, plan, and bindings payloads as workflow artifacts.
        required: false
        default: true
        type: boolean
      generate_bindings:
        description: Generate target-specific bindings after validate and plan.
        required: false
        default: true
        type: boolean
      bindings_target:
        description: Target adapter to use when generate_bindings is enabled.
        required: false
        default: aws-lambda
        type: string
      instrumentation_mode:
        description: AWS Lambda instrumentation mode.
        required: false
        default: code
        type: string
      adot_lambda_layer_arn:
        description: Optional ADOT Lambda layer ARN when instrumentation_mode is adot_layer.
        required: false
        default: ""
        type: string
      collector_endpoint:
        description: Optional collector OTLP base endpoint.
        required: false
        default: ""
        type: string
      collector_traces_endpoint:
        description: Optional collector traces endpoint override.
        required: false
        default: ""
        type: string
      collector_metrics_endpoint:
        description: Optional collector metrics endpoint override.
        required: false
        default: ""
        type: string
      direct_endpoint:
        description: Optional direct OTLP base endpoint.
        required: false
        default: ""
        type: string
      direct_traces_endpoint:
        description: Optional direct traces endpoint override.
        required: false
        default: ""
        type: string
      direct_metrics_endpoint:
        description: Optional direct metrics endpoint override.
        required: false
        default: ""
        type: string
      metric_export_interval_ms:
        description: Metric export interval in milliseconds.
        required: false
        default: 10000
        type: number
      emf_compatibility_mode:
        description: Keep EMF compatibility mode enabled for AWS Lambda bindings.
        required: false
        default: true
        type: boolean
      deploy_managed_suite:
        description: Deploy the platform-managed suite before generating bindings.
        required: false
        default: false
        type: boolean
      reuse_managed_suite:
        description: Reuse an existing platform-managed suite by reading its Terraform state outputs.
        required: false
        default: true
        type: boolean
      aws_region:
        description: AWS region used when deploy_managed_suite is enabled.
        required: false
        default: us-east-1
        type: string
      managed_suite_name:
        description: Base name used for managed-suite resources.
        required: false
        default: o11y-platform
        type: string
      managed_suite_subnet_id:
        description: Optional subnet ID for the managed suite.
        required: false
        default: ""
        type: string
      managed_suite_instance_type:
        description: EC2 instance type for the managed suite.
        required: false
        default: t3.small
        type: string
      managed_suite_root_volume_size_gb:
        description: Root volume size in GiB for the managed suite.
        required: false
        default: 20
        type: number
      managed_suite_dashboard_uid:
        description: Grafana dashboard UID for the managed suite.
        required: false
        default: platform-observability
        type: string
      managed_suite_dashboard_title:
        description: Grafana dashboard title for the managed suite.
        required: false
        default: Platform Observability
        type: string
      managed_suite_grafana_allowed_cidrs:
        description: JSON array of CIDR ranges allowed to access Grafana.
        required: false
        default: "[\"0.0.0.0/0\"]"
        type: string
      managed_suite_otlp_allowed_cidrs:
        description: JSON array of CIDR ranges allowed to access OTLP endpoints.
        required: false
        default: "[\"0.0.0.0/0\"]"
        type: string
      managed_suite_ssh_allowed_cidrs:
        description: JSON array of CIDR ranges allowed to access SSH.
        required: false
        default: "[]"
        type: string
    outputs:
      validation_message:
        description: Validation result message.
        value: ${{ jobs.contract.outputs.validation_message }}
      plan_json:
        description: Backend-neutral plan JSON.
        value: ${{ jobs.contract.outputs.plan_json }}
      bindings_json:
        description: Target-specific bindings JSON when generate_bindings is enabled.
        value: ${{ jobs.contract.outputs.bindings_json }}
      managed_suite_enabled:
        description: Whether the managed suite was available to the workflow.
        value: ${{ jobs.contract.outputs.managed_suite_enabled }}
      managed_suite_grafana_url:
        description: Grafana URL when the managed suite was available.
        value: ${{ jobs.contract.outputs.managed_suite_grafana_url }}
      managed_suite_otlp_http_endpoint:
        description: Alloy OTLP HTTP endpoint when the managed suite was available.
        value: ${{ jobs.contract.outputs.managed_suite_otlp_http_endpoint }}
      workload_dashboard_backend:
        description: Backend that materialized the workload dashboard.
        value: ${{ jobs.contract.outputs.workload_dashboard_backend }}
      workload_dashboard_uid:
        description: Workload dashboard UID when the platform materialized one.
        value: ${{ jobs.contract.outputs.workload_dashboard_uid }}
      workload_dashboard_url:
        description: Workload dashboard URL when the platform materialized one.
        value: ${{ jobs.contract.outputs.workload_dashboard_url }}
      effective_collector_endpoint:
        description: Effective collector endpoint used for bindings generation.
        value: ${{ jobs.contract.outputs.effective_collector_endpoint }}
      effective_collector_source:
        description: "Source of the effective collector endpoint: explicit, managed_suite, or none."
        value: ${{ jobs.contract.outputs.effective_collector_source }}

jobs:
  contract:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      validation_message: ${{ steps.contract-consumer.outputs.validation_message }}
      plan_json: ${{ steps.contract-consumer.outputs.plan_json }}
      bindings_json: ${{ steps.contract-consumer.outputs.bindings_json }}
      managed_suite_enabled: ${{ steps.contract-consumer.outputs.managed_suite_enabled }}
      managed_suite_grafana_url: ${{ steps.contract-consumer.outputs.managed_suite_grafana_url }}
      managed_suite_otlp_http_endpoint: ${{ steps.contract-consumer.outputs.managed_suite_otlp_http_endpoint }}
      workload_dashboard_backend: ${{ steps.contract-consumer.outputs.workload_dashboard_backend }}
      workload_dashboard_uid: ${{ steps.contract-consumer.outputs.workload_dashboard_uid }}
      workload_dashboard_url: ${{ steps.contract-consumer.outputs.workload_dashboard_url }}
      effective_collector_endpoint: ${{ steps.contract-consumer.outputs.effective_collector_endpoint }}
      effective_collector_source: ${{ steps.contract-consumer.outputs.effective_collector_source }}
    steps:
      - name: Checkout caller repository
        uses: actions/checkout@v4

      - name: Checkout platform repository
        uses: actions/checkout@v4
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: platform-repo

      - name: Run contract consumer
        id: contract-consumer
        uses: ./platform-repo/.github/actions/contract-consumer
        with:
          contract_path: ${{ inputs.contract_path }}
          upload_artifacts: ${{ inputs.upload_artifacts }}
          generate_bindings: ${{ inputs.generate_bindings }}
          bindings_target: ${{ inputs.bindings_target }}
          instrumentation_mode: ${{ inputs.instrumentation_mode }}
          adot_lambda_layer_arn: ${{ inputs.adot_lambda_layer_arn }}
          collector_endpoint: ${{ inputs.collector_endpoint }}
          collector_traces_endpoint: ${{ inputs.collector_traces_endpoint }}
          collector_metrics_endpoint: ${{ inputs.collector_metrics_endpoint }}
          direct_endpoint: ${{ inputs.direct_endpoint }}
          direct_traces_endpoint: ${{ inputs.direct_traces_endpoint }}
          direct_metrics_endpoint: ${{ inputs.direct_metrics_endpoint }}
          metric_export_interval_ms: ${{ inputs.metric_export_interval_ms }}
          emf_compatibility_mode: ${{ inputs.emf_compatibility_mode }}
          deploy_managed_suite: ${{ inputs.deploy_managed_suite }}
          reuse_managed_suite: ${{ inputs.reuse_managed_suite }}
          aws_region: ${{ inputs.aws_region }}
          managed_suite_name: ${{ inputs.managed_suite_name }}
          managed_suite_subnet_id: ${{ inputs.managed_suite_subnet_id }}
          managed_suite_instance_type: ${{ inputs.managed_suite_instance_type }}
          managed_suite_root_volume_size_gb: ${{ inputs.managed_suite_root_volume_size_gb }}
          managed_suite_dashboard_uid: ${{ inputs.managed_suite_dashboard_uid }}
          managed_suite_dashboard_title: ${{ inputs.managed_suite_dashboard_title }}
          managed_suite_grafana_allowed_cidrs: ${{ inputs.managed_suite_grafana_allowed_cidrs }}
          managed_suite_otlp_allowed_cidrs: ${{ inputs.managed_suite_otlp_allowed_cidrs }}
          managed_suite_ssh_allowed_cidrs: ${{ inputs.managed_suite_ssh_allowed_cidrs }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
          TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
          TF_STATE_KEY: ${{ vars.TF_STATE_KEY }}
          OBSERVABILITY_SUITE_GRAFANA_ADMIN_PASSWORD: ${{ secrets.OBSERVABILITY_SUITE_GRAFANA_ADMIN_PASSWORD != '' && secrets.OBSERVABILITY_SUITE_GRAFANA_ADMIN_PASSWORD || vars.OBSERVABILITY_SUITE_GRAFANA_ADMIN_PASSWORD || '' }}
