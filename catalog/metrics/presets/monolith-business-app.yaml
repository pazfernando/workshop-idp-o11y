name: monolith-business-app
displayName: Monolith Business Application
description: Standard OpenTelemetry JVM and HTTP metrics for monolithic application services.
contractMetrics:
  - http.server.request.duration
  - http.client.request.duration
recommendedRuntimeMetrics:
  - jvm.memory.used
  - jvm.memory.limit
  - jvm.cpu.time
  - jvm.cpu.count
  - jvm.cpu.recent_utilization
  - jvm.class.count
