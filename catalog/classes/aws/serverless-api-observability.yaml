apiVersion: observability.platform/v1alpha1
kind: PlatformClass
metadata:
  name: aws-serverless-api-observability
  layer: catalog
spec:
  target: aws
  runtime: aws-lambda
  purpose: Starter class for dashboards, alerts, and managed-suite assets around API Gateway plus Lambda workloads.
  contractMapping:
    dashboardPresets:
      - serverless-api
      - serverless-api-async-workflow
  templates:
    grafanaStarterDashboard: assets/collector/managed-suite/grafana-dashboard.json.tftpl
  notes:
    - The Grafana starter dashboard is the platform-owned workload dashboard artifact for both `serverless-api` and `serverless-api-async-workflow`.
    - AWS runtime metrics such as Lambda invocations, duration, and CloudWatch Logs remain backend concerns rather than caller-owned dashboard resources.
